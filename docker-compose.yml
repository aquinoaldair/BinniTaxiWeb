services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WWWGROUP: 1000
        WWWUSER: 1000
        COMPOSER_VERSION: 2.8.12
    container_name: binnitaxi-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      REDIS_HOST: redis
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - binnitaxi

  nginx:
    image: nginx:1.28.0-alpine
    container_name: binnitaxi-nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - binnitaxi

  node:
    image: node:22.12.0-alpine
    container_name: binnitaxi-node
    restart: unless-stopped
    user: "0:0"
    working_dir: /var/www/html
    command: sh -c "mkdir -p /var/www/html/node_modules && if [ -f package-lock.json ]; then npm ci; else npm install; fi && chown -R 1000:1000 /var/www/html/node_modules /var/www/html/package-lock.json && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    depends_on:
      - app
    networks:
      - binnitaxi

  db:
    image: postgres:18.3
    container_name: binnitaxi-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: binnitaxi
      POSTGRES_USER: binnitaxi
      POSTGRES_PASSWORD: binnitaxi
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U binnitaxi -d binnitaxi"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - binnitaxi

  redis:
    image: redis:8.0-alpine
    container_name: binnitaxi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - binnitaxi

networks:
  binnitaxi:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  node_modules:
